name: Deploy Shopify Theme

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'assets/**'
      - 'config/**'
      - 'layout/**'
      - 'locales/**'
      - 'sections/**'
      - 'snippets/**'
      - 'templates/**'
      - '.github/workflows/shopify-theme-deploy.yml'

concurrency:
  group: shopify-theme-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SHOPIFY_FLAG_STORE: iceberg-9988.myshopify.com
      THEME_ID: "185964691746"
      THEME_PATH: "."
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Push theme safely (no deletes)
        run: |
          shopify theme push \
            --path "$THEME_PATH" \
            --store "$SHOPIFY_FLAG_STORE" \
            --theme "$THEME_ID" \
            --allow-live \
            --nodelete
